<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Quiral - Sistema Tático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: monospace; }
        .map-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; border: 1px solid #333; }
        .node { position: absolute; width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body class="p-4">
    <div id="admin-modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center">
        <div class="bg-gray-900 p-6 rounded border border-gray-700 w-80">
            <h2 class="text-red-500 mb-4 font-bold text-center">ACESSO ADMIN</h2>
            <input type="password" id="pass" placeholder="Palavra-passe" class="w-full bg-black p-2 mb-4 border border-gray-700">
            <button onclick="checkAdmin()" class="w-full bg-blue-700 py-2">AUTENTICAR</button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl text-green-500">REDE QUIRAL</h1>
            <button onclick="document.getElementById('admin-modal').classList.remove('hidden')" class="text-xs text-gray-500">ADMIN</button>
        </div>
        
        <div class="map-container mb-6" id="map-wrap">
            <img id="map-img" class="w-full h-full object-cover hidden">
            <div id="nodes-layer" class="absolute inset-0"></div>
        </div>

        <div id="status-bar" class="p-4 bg-gray-900 border border-gray-800 text-center">CARREGANDO DADOS...</div>
    </main>

    <script>
        const API = "https://quiral-f97a2-default-rtdb.firebaseio.com/quiral.json";
        let isAdmin = false;

        function checkAdmin() {
            if(document.getElementById('pass').value === 'felipe123') {
                isAdmin = true;
                document.getElementById('admin-modal').classList.add('hidden');
                alert("Acesso concedido.");
            }
        }

        async function sync() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                
                if (!data) return;

                // Carregar Mapa
                const img = document.getElementById('map-img');
                if (data.mapImage) {
                    img.src = data.mapImage;
                    img.classList.remove('hidden');
                }

                // Carregar Nós com verificação de segurança
                if (data.nos && Array.isArray(data.nos)) {
                    const layer = document.getElementById('nodes-layer');
                    layer.innerHTML = '';
                    data.nos.forEach((n, i) => {
                        const div = document.createElement('div');
                        div.className = 'node';
                        div.style.left = (10 + (i * 8)) + '%';
                        div.style.top = '50%';
                        div.style.backgroundColor = n.owner == 1 ? 'blue' : (n.owner == 2 ? 'yellow' : 'gray');
                        div.innerText = i + 1;
                        layer.appendChild(div);
                    });
                }

                document.getElementById('status-bar').innerText = data.st === "ON" ? "SISTEMA ATIVO" : "SISTEMA OCIOSO";
            } catch(e) {
                console.error("Erro de sincronização:", e);
            }
        }

        setInterval(sync, 3000);
        sync();
    </script>
</body>
</html>
