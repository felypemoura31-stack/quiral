<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rede Quiral - Comando Tático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; background-color: #050505; color: #fff; }
        .bg-chiral { background: linear-gradient(180deg, #1a1a1a 0%, #050505 100%); }
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .map-node { transition: all 0.3s; }
        .active-blue { background-color: rgba(59, 130, 246, 0.8); border: 2px solid #60a5fa; box-shadow: 0 0 15px #3b82f6; }
        .active-yellow { background-color: rgba(234, 179, 8, 0.8); border: 2px solid #fde047; box-shadow: 0 0 15px #eab308; }
        .active-green { background-color: rgba(34, 197, 94, 0.8); border: 2px solid #4ade80; box-shadow: 0 0 15px #22c55e; }
        .inactive-red { background-color: rgba(239, 68, 68, 0.8); border: 2px solid #f87171; box-shadow: 0 0 15px #ef4444; }
        .offline { background-color: rgba(31, 41, 55, 0.8); border: 2px solid #4b5563; }
    </style>
</head>
<body class="bg-chiral min-h-screen p-4">

    <!-- MODALS -->
    <div id="modal-box" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[70] hidden">
        <div class="bg-gray-900 border border-gray-700 p-6 rounded-lg text-center max-w-sm mx-4">
            <h3 class="text-xl text-yellow-500 font-bold mb-2">SISTEMA</h3>
            <p id="modal-text" class="text-gray-300 mb-4"></p>
            <button onclick="closeModal()" class="px-6 py-2 bg-gray-700 text-white rounded">ENTENDIDO</button>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[70] hidden">
        <div class="bg-gray-900 border border-gray-700 p-6 rounded-lg w-full max-w-sm mx-4">
            <h3 class="text-xl text-red-500 font-bold mb-4 text-center">ACESSO ADMIN</h3>
            <input type="text" id="admin-user" placeholder="Usuário" class="w-full bg-black border border-gray-600 rounded p-2 mb-3 text-white">
            <input type="password" id="admin-pass" placeholder="Senha" class="w-full bg-black border border-gray-600 rounded p-2 mb-4 text-white">
            <div class="flex justify-between">
                <button onclick="closeAdminModal()" class="px-4 py-2 bg-gray-700 text-white rounded">CANCELAR</button>
                <button onclick="authenticateAdmin()" class="px-4 py-2 bg-blue-800 text-white rounded">ENTRAR</button>
            </div>
        </div>
    </div>

    <header class="text-center w-full max-w-6xl mx-auto border-b border-gray-800 pb-4 mb-4">
        <h1 class="text-3xl font-bold text-green-400">[ COMANDO QUIRAL ]</h1>
    </header>

    <main class="w-full max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-gray-900/80 border border-gray-700 p-4 rounded-lg flex justify-between">
                <div class="text-center w-1/3"><h3 class="text-blue-500 font-bold">AZUL</h3><div id="score-azul" class="text-5xl font-bold">0</div></div>
                <div class="text-center w-1/3"><div id="game-time" class="text-3xl font-bold">00:00</div></div>
                <div class="text-center w-1/3"><h3 class="text-yellow-500 font-bold">AMARELA</h3><div id="score-amarelo" class="text-5xl font-bold">0</div></div>
            </div>
            
            <div class="bg-gray-900/80 border border-gray-700 p-4 rounded-lg">
                <div class="flex justify-between mb-4">
                    <h2 class="text-gray-400 font-bold">MAPA TÁTICO</h2>
                    <button id="btn-admin" onclick="openAdminModal()" class="bg-gray-800 text-xs text-white px-3 py-1 rounded border border-gray-600">ADMIN</button>
                </div>
                <div id="map-container" class="relative w-full bg-black border border-gray-800 rounded overflow-hidden" style="aspect-ratio: 16/9;">
                    <img id="map-bg" class="w-full h-full object-cover hidden">
                    <div id="map-nodes-layer" class="absolute inset-0 z-10"></div>
                </div>
            </div>
        </div>

        <div class="bg-gray-900/80 border border-gray-700 rounded-lg flex flex-col h-[400px]">
            <div class="p-3 border-b border-gray-800 font-bold text-gray-300">REGISTO DE COMBATE</div>
            <div id="log-box" class="flex-1 p-3 overflow-y-auto log-container space-y-2 text-sm"></div>
        </div>
    </main>

    <script>
        const FIREBASE_URL = "https://quiral-f97a2-default-rtdb.firebaseio.com/quiral.json";
        let isAdmin = sessionStorage.getItem('isAdmin') === 'true';
        let lastNodesData = null;

        // --- MODO ADMIN ---
        function openAdminModal() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }
        function closeModal() { document.getElementById('modal-box').classList.add('hidden'); }
        
        function authenticateAdmin() {
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;
            if (u === 'quiral' && p === 'felipe123') {
                isAdmin = true;
                sessionStorage.setItem('isAdmin', 'true');
                closeAdminModal();
                alert("Modo Admin Ativado");
            } else {
                alert("Senha Incorreta");
            }
        }

        // --- SISTEMA DE LOGS ---
        function addLog(msg) {
            const box = document.getElementById('log-box');
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString('pt-PT', { hour12: false });
            div.innerHTML = `<span class="text-gray-500">[${time}]</span> ${msg}`;
            box.prepend(div);
        }

        // --- CORE LÓGICA ---
        async function updateDashboard() {
            try {
                const res = await fetch(FIREBASE_URL + "?nocache=" + Date.now());
                const data = await res.json();
                if (!data) return;

                document.getElementById('score-azul').innerText = data.az || "0";
                document.getElementById('score-amarelo').innerText = data.am || "0";
                document.getElementById('game-time').innerText = data.tp || "00:00";

                if (lastNodesData && data.nos) {
                    data.nos.forEach((n, i) => {
                        const prev = lastNodesData[i];
                        if (n.online && prev && n.owner !== prev.owner) {
                            const team = n.owner === 1 ? "AZUL" : (n.owner === 2 ? "AMARELA" : "NEUTRO");
                            const color = n.owner === 1 ? "text-blue-400" : (n.owner === 2 ? "text-yellow-400" : "text-gray-400");
                            addLog(`Nó ${i+1} capturado pelo <span class="${color} font-bold">${team}</span>`);
                        }
                    });
                }
                lastNodesData = data.nos;
            } catch(e) { console.error("Falha no Uplink"); }
        }

        // --- INICIALIZAÇÃO ---
        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
