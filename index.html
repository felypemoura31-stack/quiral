<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Quiral - Transmissão ao Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; background-color: #050505; color: #fff; }
        .neon-text { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #0ff; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .bg-chiral { background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%); }
    </style>
</head>
<body class="bg-chiral min-h-screen flex flex-col items-center p-4">

    <!-- Header -->
    <header class="text-center w-full max-w-3xl border-b border-gray-700 pb-4 mb-6">
        <h1 class="text-3xl md:text-5xl font-bold text-green-400 mb-2">[ REDE QUIRAL ]</h1>
        <p class="text-gray-400 text-sm tracking-widest">TRANSMISSÃO TÁTICA EM TEMPO REAL</p>
        <div id="status-badge" class="mt-4 inline-block px-4 py-1 rounded-full text-sm font-bold bg-gray-800 text-gray-500 border border-gray-600">
            AGUARDANDO CONEXÃO...
        </div>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-3xl grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Score Board -->
        <div class="col-span-1 md:col-span-2 bg-gray-900 border border-gray-700 p-6 rounded-lg shadow-[0_0_15px_rgba(0,0,0,0.5)]">
            <h2 class="text-center text-gray-400 mb-4">PONTUAÇÃO GLOBAL</h2>
            <div class="flex justify-between items-center">
                
                <!-- Azul -->
                <div class="text-center w-1/3">
                    <h3 class="text-xl md:text-2xl text-blue-500 font-bold mb-2">AZUL</h3>
                    <div id="score-azul" class="text-5xl md:text-7xl font-bold text-blue-400 neon-text">0</div>
                </div>

                <!-- Timer -->
                <div class="text-center w-1/3">
                    <p class="text-gray-500 text-xs mb-1">TEMPO RESTANTE</p>
                    <div id="game-time" class="text-3xl md:text-5xl font-bold text-white">00:00</div>
                    <p id="game-mode" class="text-yellow-500 text-sm mt-2">MODO: --</p>
                </div>

                <!-- Amarelo -->
                <div class="text-center w-1/3">
                    <h3 class="text-xl md:text-2xl text-yellow-500 font-bold mb-2">AMARELA</h3>
                    <div id="score-amarelo" class="text-5xl md:text-7xl font-bold text-yellow-400" style="text-shadow: 0 0 5px #ff0, 0 0 20px #a60;">0</div>
                </div>
            </div>
        </div>

        <!-- System Logs / Info -->
        <div class="col-span-1 md:col-span-2 bg-black border border-gray-800 p-4 rounded-lg">
            <h2 class="text-gray-500 text-sm mb-2 border-b border-gray-800 pb-1">UPLINK STATUS</h2>
            <div class="flex justify-between text-xs font-sans text-gray-400">
                <span>Última atualização: <span id="last-update" class="text-white">--</span></span>
                <span>Servidor: <span class="text-green-400">FIREBASE_RTDB</span></span>
            </div>
        </div>

    </main>

    <footer class="mt-8 text-gray-600 text-xs text-center">
        Desenvolvido para Operações Táticas de Airsoft<br>
        Atualização automática (3s)
    </footer>

    <script>
        // Link configurado para a base de dados oficial Quiral
        const FIREBASE_URL = "https://quiral-f97a2-default-rtdb.firebaseio.com/quiral.json"; 
        
        async function fetchUplinkData() {
            try {
                // O Firebase permite adicionar um parâmetro para evitar cache e garantir tempo real
                const response = await fetch(FIREBASE_URL + "?nocache=" + new Date().getTime());
                const data = await response.json();

                if (data) {
                    const timestamp = new Date().toLocaleTimeString();

                    // Atualiza a Interface
                    document.getElementById('score-azul').innerText = data.az !== undefined ? data.az : "0";
                    document.getElementById('score-amarelo').innerText = data.am !== undefined ? data.am : "0";
                    document.getElementById('game-time').innerText = data.tp || "00:00";
                    document.getElementById('game-mode').innerText = "MODO: " + (data.md || "QUIRAL");
                    document.getElementById('last-update').innerText = timestamp;

                    // Atualiza Status
                    const statusBadge = document.getElementById('status-badge');
                    if (data.st === "ON") {
                        statusBadge.innerText = "SISTEMA ONLINE - JOGO EM ANDAMENTO";
                        statusBadge.className = "mt-4 inline-block px-4 py-1 rounded-full text-sm font-bold bg-green-900 text-green-400 border border-green-500 pulse";
                    } else {
                        statusBadge.innerText = "SISTEMA OCIOSO / PAUSADO";
                        statusBadge.className = "mt-4 inline-block px-4 py-1 rounded-full text-sm font-bold bg-gray-800 text-gray-400 border border-gray-600";
                    }
                }
            } catch (error) {
                console.error("Falha na conexão com o Firebase:", error);
                document.getElementById('status-badge').innerText = "FALHA DE SINAL COM O FIREBASE";
                document.getElementById('status-badge').className = "mt-4 inline-block px-4 py-1 rounded-full text-sm font-bold bg-red-900 text-red-400 border border-red-500";
            }
        }

        // Tenta buscar dados imediatamente e depois a cada 3 segundos
        fetchUplinkData();
        setInterval(fetchUplinkData, 3000);
    </script>
</body>
</html>
