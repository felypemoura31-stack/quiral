<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Quiral - Comando Tático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; background-color: #050505; color: #fff; }
        .neon-text { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #0ff; }
        .bg-chiral { background: linear-gradient(180deg, #1a1a1a 0%, #050505 100%); }
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .map-node { transition: all 0.3s ease; }
        .active-blue { background-color: rgba(59, 130, 246, 0.8); border-color: #60a5fa; box-shadow: 0 0 15px #3b82f6; }
        .active-yellow { background-color: rgba(234, 179, 8, 0.8); border-color: #fde047; box-shadow: 0 0 15px #eab308; }
        .inactive-red { background-color: rgba(239, 68, 68, 0.8); border-color: #f87171; box-shadow: 0 0 15px #ef4444; }
        .offline { background-color: rgba(31, 41, 55, 0.8); border-color: #4b5563; }
    </style>
</head>
<body class="bg-chiral min-h-screen p-4">

    <!-- Modals -->
    <div id="modal-box" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[70] hidden">
        <div class="bg-gray-900 p-6 rounded-lg text-center border border-gray-700">
            <h3 class="text-xl text-yellow-500 font-bold mb-4">AVISO</h3>
            <p id="modal-text" class="text-white mb-4"></p>
            <button onclick="closeModal()" class="px-6 py-2 bg-gray-700 rounded">OK</button>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[70] hidden">
        <div class="bg-gray-900 p-6 rounded-lg border border-gray-700 w-80">
            <h3 class="text-xl text-red-500 font-bold mb-4 text-center">LOGIN ADMIN</h3>
            <input type="text" id="admin-user" placeholder="Usuário" class="w-full bg-black p-2 mb-2 border border-gray-600 rounded">
            <input type="password" id="admin-pass" placeholder="Senha" class="w-full bg-black p-2 mb-4 border border-gray-600 rounded">
            <div class="flex gap-2">
                <button onclick="closeAdminModal()" class="flex-1 py-2 bg-gray-700 rounded">CANCELAR</button>
                <button onclick="authenticateAdmin()" class="flex-1 py-2 bg-blue-800 rounded">ENTRAR</button>
            </div>
        </div>
    </div>

    <header class="text-center max-w-6xl mx-auto border-b border-gray-800 pb-4 mb-4">
        <h1 class="text-4xl font-bold text-green-400 tracking-wider">[ COMANDO QUIRAL ]</h1>
        <div id="status-badge" class="mt-2 px-3 py-1 rounded text-sm font-bold bg-gray-800 text-gray-500 border border-gray-700 inline-block">A ESTABELECER LIGAÇÃO...</div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-gray-900/80 border border-gray-700 p-6 rounded-lg flex justify-between">
                <div class="text-center"><h3 class="text-blue-400 font-bold">AZUL</h3><div id="score-azul" class="text-5xl font-bold neon-text">0</div></div>
                <div class="text-center"><div id="game-time" class="text-4xl font-bold text-white">00:00</div><div id="game-mode" class="text-gray-400 text-sm">MODO: --</div></div>
                <div class="text-center"><h3 class="text-yellow-400 font-bold">AMARELO</h3><div id="score-amarelo" class="text-5xl font-bold">0</div></div>
            </div>

            <div class="bg-gray-900/80 border border-gray-700 p-4 rounded-lg">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-gray-400">MAPA TÁTICO</h2>
                    <button id="btn-admin" onclick="openAdminModal()" class="bg-gray-800 text-xs px-3 py-1 rounded">ADMIN</button>
                    <label id="btn-upload" class="hidden cursor-pointer bg-blue-900 text-xs px-3 py-1 rounded">
                        IMPORTAR MAPA<input type="file" id="map-upload" accept="image/*" class="hidden">
                    </label>
                </div>
                <div id="map-container" class="relative w-full aspect-[16/9] bg-black rounded overflow-hidden">
                    <img id="map-bg" class="w-full h-full object-cover hidden">
                    <div id="map-nodes-layer" class="absolute inset-0 z-10"></div>
                </div>
            </div>
        </div>

        <div class="bg-gray-900/80 border border-gray-700 rounded-lg flex flex-col h-[400px]">
            <div class="p-3 border-b border-gray-800 bg-gray-800/50 rounded-t-lg font-bold text-gray-300">REGISTO DE COMBATE</div>
            <div id="log-box" class="flex-1 p-3 overflow-y-auto space-y-2 text-sm font-sans"></div>
        </div>
    </main>

    <script>
        const FIREBASE_URL = "https://quiral-f97a2-default-rtdb.firebaseio.com/quiral.json";
        let isAdmin = sessionStorage.getItem('isAdmin') === 'true';
        let lastNodesData = [];

        function showModal(msg) { document.getElementById('modal-text').innerText = msg; document.getElementById('modal-box').classList.remove('hidden'); setTimeout(() => document.getElementById('modal-box').classList.remove('opacity-0'), 10); }
        function closeModal() { document.getElementById('modal-box').classList.add('hidden'); }
        function openAdminModal() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }

        function authenticateAdmin() {
            if (document.getElementById('admin-user').value === 'quiral' && document.getElementById('admin-pass').value === 'felipe123') {
                isAdmin = true; sessionStorage.setItem('isAdmin', 'true'); closeAdminModal();
            } else { showModal("Credenciais incorretas."); }
        }

        function addLog(msg) {
            const box = document.getElementById('log-box');
            const time = new Date().toLocaleTimeString('pt-PT', { hour12: false });
            box.innerHTML = `<div class="border-l-2 border-gray-600 pl-2 bg-gray-800/30 p-1 rounded-r">[${time}] ${msg}</div>` + box.innerHTML;
        }

        function renderNodes(data) {
            const layer = document.getElementById('map-nodes-layer');
            if (layer.children.length === 0) {
                for(let i=1; i<=10; i++) {
                    const el = document.createElement('div');
                    el.id = 'node-' + i;
                    el.className = 'map-node absolute w-6 h-6 rounded-full border-2 bg-gray-800 text-[10px] flex items-center justify-center';
                    el.innerText = i;
                    el.style.left = (i*8) + '%'; el.style.top = '20%';
                    layer.appendChild(el);
                }
            }
            
            data.nos.forEach((node, i) => {
                const el = document.getElementById('node-' + (i+1));
                if (!el) return;
                el.className = 'map-node absolute w-6 h-6 rounded-full border-2 flex items-center justify-center ' + 
                               (node.online ? (node.owner == 1 ? 'active-blue' : node.owner == 2 ? 'active-yellow' : 'offline') : 'offline');
            });
        }

        async function updateDashboard() {
            try {
                const res = await fetch(FIREBASE_URL);
                const data = await res.json();
                if (!data) return;

                // Status Badge
                const badge = document.getElementById('status-badge');
                if (data.st === "ON") {
                    badge.innerText = "SISTEMA ONLINE - JOGO EM ANDAMENTO";
                    badge.className = "mt-2 inline-block px-3 py-1 rounded text-sm font-bold bg-green-900/50 text-green-400 border border-green-500";
                } else {
                    badge.innerText = "SISTEMA OCIOSO";
                    badge.className = "mt-2 inline-block px-3 py-1 rounded text-sm font-bold bg-gray-800 text-gray-500 border border-gray-700";
                }

                // Placar
                document.getElementById('score-azul').innerText = data.az || "0";
                document.getElementById('score-amarelo').innerText = data.am || "0";
                document.getElementById('game-time').innerText = data.tp || "00:00";

                // Analise de Log
                if (lastNodesData.length > 0) {
                    data.nos.forEach((n, i) => {
                        if (n.owner !== lastNodesData[i].owner && n.online) {
                            if (n.owner == 1) addLog(`Nó ${i+1} capturado pelo <span class="text-blue-400">AZUL</span>.`);
                            else if (n.owner == 2) addLog(`Nó ${i+1} capturado pelo <span class="text-yellow-400">AMARELO</span>.`);
                            else if (n.owner == 0) addLog(`Nó ${i+1} <span class="text-gray-400">NEUTRALIZADO</span>.`);
                        }
                    });
                }
                
                lastNodesData = data.nos;
                renderNodes(data);
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();

            } catch(e) { console.error(e); }
        }

        setInterval(updateDashboard, 2000);
    </script>
</body>
</html>
